{{- /* chezmoi:modify-template */ -}}
{{- $c := .chezmoi.stdin -}}
{{- if eq $c "" -}}
#? Config file for btop
color_theme = "tokyo-storm.theme"
vim_keys = True
{{- else -}}
{{- $c = regexReplaceAll `(?m)^color_theme = .*` $c `color_theme = "tokyo-storm.theme"` -}}
{{- $c = regexReplaceAll `(?m)^vim_keys = .*` $c `vim_keys = True` -}}
{{- $c -}}
{{- end -}}
